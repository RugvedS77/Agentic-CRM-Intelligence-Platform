services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: senai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    command: ["npm", "run", "dev"]
    networks:
      - senai-network

  backend:
    # { changed code }
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: senai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - chroma
    volumes:
      - ./backend:/app
    networks:
      - senai-network
    # { changed code }

  chroma:
    image: chromadb/chroma:latest
    container_name: senai-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - senai-network

volumes:
  chroma_data:

# { changed code }
networks:
  senai-network:
    driver: bridge
# { changed code }